<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 640" font-family="system-ui, sans-serif">
  <!--
    Structure r6: truss of 2 stacked panels (one above the other).
    Each panel: 5 m wide x 6 m tall -> 12 m tall total.
    Diagonals that GO DOWN to the LEFT (low end on the left).
    World in metres, y up. Transform: sx = 180 + x*40 ; sy = 540 - y*40
    Nodes (6):
      E (0,12) -> (180, 60)      F (5,12) -> (380, 60)   [top]
      C (0, 6) -> (180,300)      D (5, 6) -> (380,300)   [middle]
      A (0, 0) -> (180,540)      B (5, 0) -> (380,540)   [bottom]
    Bars (9):
      b1 -> floor (bottom chord):     A-B
      b2 -> lower left post:          A-C
      b3 -> lower panel diagonal:     A-D  (goes down to the left)
      b4 -> lower right post:         B-D
      b5 -> intermediate chord:       C-D
      b6 -> upper left post:          C-E
      b7 -> upper panel diagonal:     C-F  (goes down to the left)
      b8 -> upper right post:         D-F
      b9 -> top chord:                E-F
    Supports (to the ground):
      A (0,0) -> pinned support: reactions H and V
      B (5,0) -> roller support: VERTICAL reaction
    Loads:
      C (0, 6) : 2 T horizontal to the right
      E (0,12) : 3 T horizontal to the right + 4 T vertical downward
      F (5,12) : 5 T vertical downward
    Support reactions:
      A : H_A = 5 T to the left ; V_A = 5,6 T downward
      B : V_B = 14,6 T upward
    Equilibrium check (OK):
      SFx  = 2 + 3 - 5             = 0
      SFy  = 14,6 - (5,6 + 5 + 4)  = 0
      SM_A = -(2*6) - (3*12) - (5*5) + (14,6*5) = 0
             (the 4 T load at E passes through the vertical of A: zero moment)
  -->

  <rect x="0" y="0" width="600" height="640" fill="#ffffff"/>

  <!-- ===== Dimensions ===== -->
  <g stroke="#9aa0a6" stroke-width="1" fill="#5f6368" font-size="12">
    <!-- width: 5.00 m (top chord) -->
    <line x1="180" y1="22" x2="380" y2="22"/>
    <line x1="180" y1="17" x2="180" y2="27"/>
    <line x1="380" y1="17" x2="380" y2="27"/>
    <text x="280" y="14" text-anchor="middle">5.00 m</text>

    <!-- height: 6.00 m per panel (right side) -->
    <line x1="440" y1="540" x2="440" y2="300"/>
    <line x1="435" y1="540" x2="445" y2="540"/>
    <line x1="435" y1="300" x2="445" y2="300"/>
    <text x="453" y="420" text-anchor="middle" transform="rotate(-90 453 420)">6.00 m</text>

    <line x1="440" y1="300" x2="440" y2="60"/>
    <line x1="435" y1="300" x2="445" y2="300"/>
    <line x1="435" y1="60"  x2="445" y2="60"/>
    <text x="453" y="180" text-anchor="middle" transform="rotate(-90 453 180)">6.00 m</text>
  </g>

  <!-- ===== Truss: two-force members (double hinge) ===== -->
  <g stroke="#1a1a1a" stroke-width="3" stroke-linecap="round">
    <!-- b1: floor (bottom chord) A-B -->
    <line x1="180" y1="540" x2="380" y2="540"/>
    <!-- b2: lower left post A-C -->
    <line x1="180" y1="540" x2="180" y2="300"/>
    <!-- b3: lower panel diagonal A-D (goes down to the left) -->
    <line x1="180" y1="540" x2="380" y2="300"/>
    <!-- b4: lower right post B-D -->
    <line x1="380" y1="540" x2="380" y2="300"/>
    <!-- b5: intermediate chord C-D -->
    <line x1="180" y1="300" x2="380" y2="300"/>
    <!-- b6: upper left post C-E -->
    <line x1="180" y1="300" x2="180" y2="60"/>
    <!-- b7: upper panel diagonal C-F (goes down to the left) -->
    <line x1="180" y1="300" x2="380" y2="60"/>
    <!-- b8: upper right post D-F -->
    <line x1="380" y1="300" x2="380" y2="60"/>
    <!-- b9: top chord E-F -->
    <line x1="180" y1="60"  x2="380" y2="60"/>
  </g>

  <!-- ===== Nodes ===== -->
  <g fill="#000000">
    <circle cx="180" cy="540" r="4"/>
    <circle cx="380" cy="540" r="4"/>
    <circle cx="180" cy="300" r="4"/>
    <circle cx="380" cy="300" r="4"/>
    <circle cx="180" cy="60"  r="4"/>
    <circle cx="380" cy="60"  r="4"/>
  </g>

  <!-- ===== Node labels ===== -->
  <g font-size="13" font-weight="600" fill="#6a1b9a">
    <text x="168" y="538" text-anchor="end">A</text>
    <text x="392" y="538" text-anchor="start">B</text>
    <text x="170" y="318" text-anchor="end">C</text>
    <text x="392" y="296" text-anchor="start">D</text>
    <text x="170" y="50"  text-anchor="end">E</text>
    <text x="392" y="56"  text-anchor="start">F</text>
  </g>

  <!-- ===== Bar names (b with subscript) ===== -->
  <g fill="#6a1b9a" font-size="13" font-style="italic" font-weight="600">
    <!-- lower panel -->
    <text x="280" y="558" text-anchor="middle">b<tspan font-size="9" dy="3">1</tspan></text>
    <text x="170" y="424" text-anchor="end">b<tspan font-size="9" dy="3">2</tspan></text>
    <text x="296" y="425" text-anchor="start">b<tspan font-size="9" dy="3">3</tspan></text>
    <text x="390" y="424" text-anchor="start">b<tspan font-size="9" dy="3">4</tspan></text>
    <text x="280" y="294" text-anchor="middle">b<tspan font-size="9" dy="3">5</tspan></text>
    <!-- upper panel -->
    <text x="170" y="184" text-anchor="end">b<tspan font-size="9" dy="3">6</tspan></text>
    <text x="296" y="185" text-anchor="start">b<tspan font-size="9" dy="3">7</tspan></text>
    <text x="390" y="184" text-anchor="start">b<tspan font-size="9" dy="3">8</tspan></text>
    <text x="280" y="54"  text-anchor="middle">b<tspan font-size="9" dy="3">9</tspan></text>
  </g>

  <!-- ===== Supports (to the ground) ===== -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#ffffff">
    <!-- A: pinned support on the ground -->
    <polygon points="180,540 166,562 194,562"/>
    <line x1="156" y1="562" x2="204" y2="562"/>
    <line x1="163" y1="562" x2="156" y2="569"/>
    <line x1="171" y1="562" x2="164" y2="569"/>
    <line x1="179" y1="562" x2="172" y2="569"/>
    <line x1="187" y1="562" x2="180" y2="569"/>
    <line x1="195" y1="562" x2="188" y2="569"/>
    <line x1="203" y1="562" x2="196" y2="569"/>
    <!-- B: roller support on the ground -> vertical reaction -->
    <polygon points="380,540 366,560 394,560"/>
    <circle cx="373" cy="564" r="3"/>
    <circle cx="387" cy="564" r="3"/>
    <line x1="356" y1="568" x2="404" y2="568"/>
    <line x1="363" y1="568" x2="356" y2="575"/>
    <line x1="371" y1="568" x2="364" y2="575"/>
    <line x1="379" y1="568" x2="372" y2="575"/>
    <line x1="387" y1="568" x2="380" y2="575"/>
    <line x1="395" y1="568" x2="388" y2="575"/>
    <line x1="403" y1="568" x2="396" y2="575"/>
  </g>

  <!-- ===== Loads ===== -->
  <g stroke="#c0392b" fill="#c0392b" font-size="13" font-weight="700">
    <!-- C: 2 T horizontal to the right (tip at C, shaft trailing to the left) -->
    <line x1="135" y1="300" x2="167" y2="300" stroke-width="2.5"/>
    <polygon points="180,300 168,294 168,306" stroke="none"/>
    <text x="130" y="304" text-anchor="end" stroke="none">2 T</text>
    <!-- E: 3 T horizontal to the right (tip at E, shaft trailing to the left) -->
    <line x1="135" y1="60" x2="167" y2="60" stroke-width="2.5"/>
    <polygon points="180,60 168,54 168,66" stroke="none"/>
    <text x="130" y="64" text-anchor="end" stroke="none">3 T</text>
    <!-- E: 4 T vertical downward (tip at E, shaft trailing above) -->
    <line x1="180" y1="34" x2="180" y2="49" stroke-width="2.5"/>
    <polygon points="180,60 174,49 186,49" stroke="none"/>
    <text x="190" y="44" text-anchor="start" stroke="none">4 T</text>
    <!-- F: 5 T vertical downward (tip at F, shaft trailing above) -->
    <line x1="380" y1="34" x2="380" y2="49" stroke-width="2.5"/>
    <polygon points="380,60 374,49 386,49" stroke="none"/>
    <text x="388" y="44" text-anchor="start" stroke="none">5 T</text>
  </g>

  <!-- ===== Support reactions (applied at the nodes: tip at the node) ===== -->
  <g stroke="#1a73e8" fill="#1a73e8" font-size="13" font-weight="700">
    <!-- A: H_A = 5 T to the left (tip at A, shaft trailing to the right) -->
    <line x1="181" y1="540" x2="223" y2="540" stroke-width="2.5"/>
    <polygon points="180,540 192,534 192,546" stroke="none"/>
    <text x="206" y="532" text-anchor="start" stroke="none">H<tspan font-size="10" dy="4">A</tspan> = 5 T</text>
    <!-- A: V_A = 5,6 T downward (tip at A, shaft trailing upward) -->
    <line x1="180" y1="495" x2="180" y2="528" stroke-width="2.5"/>
    <polygon points="180,540 174,528 186,528" stroke="none"/>
    <text x="172" y="512" text-anchor="end" stroke="none">V<tspan font-size="10" dy="4">A</tspan> = 5,6 T</text>
    <!-- B: V_B = 14,6 T upward (tip at B, shaft trailing downward) -->
    <line x1="380" y1="552" x2="380" y2="588" stroke-width="2.5"/>
    <polygon points="380,540 374,552 386,552" stroke="none"/>
    <text x="374" y="533" text-anchor="end" stroke="none">V<tspan font-size="10" dy="4">B</tspan> = 14,6 T</text>
  </g>

  <text x="300" y="615" text-anchor="middle" fill="#5f6368" font-size="12">
    truss 2 panels 5&#215;6 m (12 m tall) · loads (red), reactions (blue)
  </text>
</svg>
