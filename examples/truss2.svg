<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="system-ui, sans-serif">
  <!--
    Estructura r4: reticulado de cordones paralelos.
    Ancho 12 m (3 paneles de 4 m), altura 4 m. Barras vert. y horiz. = 4 m.
    Mundo en metros, y hacia arriba. Transform: sx = 90 + x*50 ; sy = 290 - y*50
    Nodos:
      A (0,0)  -> ( 90,290)      B (0,4)  -> ( 90, 90)
      C (4,0)  -> (290,290)      F (4,4)  -> (290, 90)
      D (8,0)  -> (490,290)      G (8,4)  -> (490, 90)
      E (12,0) -> (690,290)      H (12,4) -> (690, 90)
    Barras:
      b1, b2, b3   -> cordon inferior (piso):  A-C, C-D, D-E
      b4, b5, b6   -> cordon superior (techo): B-F, F-G, G-H
      b7..b10      -> montantes (vert., izq->der): A-B, C-F, D-G, E-H
      b11,b12,b13  -> diagonales (bajan a la DERECHA): B-C, F-D, G-E
    Apoyos (ambos sobre el muro IZQUIERDO):
      A (0,0) -> apoyo fijo (articulado) a la pared: reacciones H y V
      B (0,4) -> apoyo movil vertical (desliza en vertical sobre el muro): reaccion HORIZONTAL
    Cargas:
      F (4,4)  : 40 T hacia abajo
      G (8,4)  : 60 T hacia abajo
      H (12,4) : 10 T hacia abajo
      E (12,0) : 20 T en diagonal abajo-derecha (depresion 45 deg) -> (+14.14, -14.14)
    Reacciones de vinculo:
      A: V_A = 124.14 T hacia arriba ; H_A = 218.29 T hacia la derecha
      B: H_B = 232.43 T hacia la izquierda
  -->

  <rect x="0" y="0" width="820" height="470" fill="#ffffff"/>

  <!-- ===== Cotas / dimensiones ===== -->
  <g stroke="#9aa0a6" stroke-width="1" fill="#5f6368" font-size="12">
    <!-- ancho: 4 | 4 | 4 -->
    <line x1="90"  y1="40" x2="690" y2="40"/>
    <line x1="90"  y1="35" x2="90"  y2="45"/>
    <line x1="290" y1="35" x2="290" y2="45"/>
    <line x1="490" y1="35" x2="490" y2="45"/>
    <line x1="690" y1="35" x2="690" y2="45"/>
    <text x="190" y="30" text-anchor="middle">4.00</text>
    <text x="390" y="30" text-anchor="middle">4.00</text>
    <text x="590" y="30" text-anchor="middle">4.00</text>

    <!-- altura: 4.00 m -->
    <line x1="765" y1="90"  x2="765" y2="290"/>
    <line x1="760" y1="90"  x2="770" y2="90"/>
    <line x1="760" y1="290" x2="770" y2="290"/>
    <text x="778" y="190" text-anchor="middle" transform="rotate(-90 778 190)">4.00 m</text>
  </g>

  <!-- ===== Reticulado: bielas (doble articulacion) ===== -->
  <g stroke="#1a1a1a" stroke-width="3" stroke-linecap="round">
    <!-- cordon inferior (piso): b1, b2, b3 -->
    <line x1="90"  y1="290" x2="290" y2="290"/>
    <line x1="290" y1="290" x2="490" y2="290"/>
    <line x1="490" y1="290" x2="690" y2="290"/>
    <!-- cordon superior (techo): b4, b5, b6 -->
    <line x1="90"  y1="90"  x2="290" y2="90"/>
    <line x1="290" y1="90"  x2="490" y2="90"/>
    <line x1="490" y1="90"  x2="690" y2="90"/>
    <!-- montantes: b7, b8, b9, b10 -->
    <line x1="90"  y1="90"  x2="90"  y2="290"/>
    <line x1="290" y1="90"  x2="290" y2="290"/>
    <line x1="490" y1="90"  x2="490" y2="290"/>
    <line x1="690" y1="90"  x2="690" y2="290"/>
    <!-- diagonales: b11, b12, b13 bajan hacia la DERECHA -->
    <line x1="90"  y1="90"  x2="290" y2="290"/>
    <line x1="290" y1="90"  x2="490" y2="290"/>
    <line x1="490" y1="90"  x2="690" y2="290"/>
  </g>

  <!-- ===== Nudos ===== -->
  <g fill="#000000">
    <circle cx="90"  cy="290" r="4"/>
    <circle cx="290" cy="290" r="4"/>
    <circle cx="490" cy="290" r="4"/>
    <circle cx="690" cy="290" r="4"/>
    <circle cx="90"  cy="90"  r="4"/>
    <circle cx="290" cy="90"  r="4"/>
    <circle cx="490" cy="90"  r="4"/>
    <circle cx="690" cy="90"  r="4"/>
  </g>

  <!-- ===== Etiquetas de nudos ===== -->
  <g font-size="13" font-weight="600" fill="#6a1b9a">
    <text x="101" y="307" text-anchor="start">A</text>
    <text x="290" y="309" text-anchor="middle">C</text>
    <text x="490" y="309" text-anchor="middle">D</text>
    <text x="702" y="286" text-anchor="start">E</text>
    <text x="87"  y="80"  text-anchor="start">B</text>
    <text x="281" y="86"  text-anchor="end">F</text>
    <text x="481" y="86"  text-anchor="end">G</text>
    <text x="700" y="86"  text-anchor="start">H</text>
  </g>

  <!-- ===== Nombres de barras (b con subindice) ===== -->
  <g fill="#6a1b9a" font-size="13" font-style="italic" font-weight="600">
    <!-- piso -->
    <text x="190" y="308" text-anchor="middle">b<tspan font-size="9" dy="3">1</tspan></text>
    <text x="390" y="308" text-anchor="middle">b<tspan font-size="9" dy="3">2</tspan></text>
    <text x="590" y="308" text-anchor="middle">b<tspan font-size="9" dy="3">3</tspan></text>
    <!-- techo -->
    <text x="190" y="106" text-anchor="middle">b<tspan font-size="9" dy="3">4</tspan></text>
    <text x="390" y="106" text-anchor="middle">b<tspan font-size="9" dy="3">5</tspan></text>
    <text x="590" y="106" text-anchor="middle">b<tspan font-size="9" dy="3">6</tspan></text>
    <!-- montantes -->
    <text x="80"  y="194" text-anchor="end">b<tspan font-size="9" dy="3">7</tspan></text>
    <text x="298" y="194" text-anchor="start">b<tspan font-size="9" dy="3">8</tspan></text>
    <text x="498" y="194" text-anchor="start">b<tspan font-size="9" dy="3">9</tspan></text>
    <text x="700" y="194" text-anchor="start">b<tspan font-size="9" dy="3">10</tspan></text>
    <!-- diagonales -->
    <text x="203" y="180" text-anchor="start">b<tspan font-size="9" dy="3">11</tspan></text>
    <text x="403" y="180" text-anchor="start">b<tspan font-size="9" dy="3">12</tspan></text>
    <text x="603" y="180" text-anchor="start">b<tspan font-size="9" dy="3">13</tspan></text>
  </g>

  <!-- ===== Apoyos (sobre el muro izquierdo) ===== -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#ffffff">
    <!-- A: apoyo fijo (articulado) contra la pared -> triangulo apoyado en el muro -->
    <polygon points="90,290 77,281 77,299"/>
    <line x1="77" y1="275" x2="77" y2="305"/>
    <line x1="77" y1="281" x2="70" y2="275"/>
    <line x1="77" y1="289" x2="70" y2="283"/>
    <line x1="77" y1="297" x2="70" y2="291"/>
    <line x1="77" y1="305" x2="70" y2="299"/>
    <!-- B: apoyo movil vertical (rodillos sobre el muro) -> reaccion horizontal -->
    <polygon points="90,90 77,81 77,99"/>
    <circle cx="73" cy="85" r="3"/>
    <circle cx="73" cy="95" r="3"/>
    <line x1="69" y1="75" x2="69" y2="105"/>
    <line x1="69" y1="79"  x2="62" y2="73"/>
    <line x1="69" y1="87"  x2="62" y2="81"/>
    <line x1="69" y1="95"  x2="62" y2="89"/>
    <line x1="69" y1="103" x2="62" y2="97"/>
  </g>

  <!-- ===== Cargas ===== -->
  <g stroke="#c0392b" fill="#c0392b" font-size="13" font-weight="700">
    <!-- F: 40 T hacia abajo -->
    <line x1="290" y1="52" x2="290" y2="80" stroke-width="2.5"/>
    <polygon points="290,88 285,77 295,77" stroke="none"/>
    <text x="298" y="68" text-anchor="start" stroke="none">40 T</text>
    <!-- G: 60 T hacia abajo -->
    <line x1="490" y1="52" x2="490" y2="80" stroke-width="2.5"/>
    <polygon points="490,88 485,77 495,77" stroke="none"/>
    <text x="498" y="68" text-anchor="start" stroke="none">60 T</text>
    <!-- H: 10 T hacia abajo -->
    <line x1="690" y1="52" x2="690" y2="80" stroke-width="2.5"/>
    <polygon points="690,88 685,77 695,77" stroke="none"/>
    <text x="698" y="68" text-anchor="start" stroke="none">10 T</text>
    <!-- E: 20 T en diagonal abajo-derecha, depresion 45 deg -->
    <line x1="690" y1="290" x2="720" y2="320" stroke-width="2.5"/>
    <polygon points="727,327 716,322 722,316" stroke="none"/>
    <text x="724" y="346" text-anchor="start" stroke="none">20 T</text>
    <!-- referencia de angulo (45 deg de depresion) -->
    <line x1="690" y1="290" x2="738" y2="290" stroke="#9aa0a6" stroke-width="1" stroke-dasharray="4 3"/>
    <path d="M 720 290 A 30 30 0 0 1 711.2 311.2" fill="none" stroke="#9aa0a6" stroke-width="1"/>
    <text x="726" y="306" text-anchor="start" stroke="none" fill="#5f6368" font-size="11" font-weight="400">45&#176;</text>
  </g>

  <!-- ===== Reacciones de vinculo (aplicadas sobre los nudos: punta en el nudo) ===== -->
  <g stroke="#1a73e8" fill="#1a73e8" font-size="13" font-weight="700">
    <!-- A: V_A = 124.14 T hacia arriba (punta en A, fuste hacia abajo) -->
    <line x1="90" y1="340" x2="90" y2="301" stroke-width="2.5"/>
    <polygon points="90,290 84,302 96,302" stroke="none"/>
    <text x="99" y="322" text-anchor="start" stroke="none">V<tspan font-size="10" dy="4">A</tspan> = 124,14 T</text>
    <!-- A: H_A = 218.29 T hacia la derecha (punta en A, fuste hacia la izquierda) -->
    <line x1="44" y1="290" x2="79" y2="290" stroke-width="2.5"/>
    <polygon points="90,290 78,284 78,296" stroke="none"/>
    <text x="98" y="283" text-anchor="start" stroke="none">H<tspan font-size="10" dy="4">A</tspan> = 218,29 T</text>
    <!-- B: H_B = 232.43 T hacia la izquierda (punta en B, fuste hacia la derecha) -->
    <line x1="138" y1="90" x2="101" y2="90" stroke-width="2.5"/>
    <polygon points="90,90 102,84 102,96" stroke="none"/>
    <text x="120" y="80" text-anchor="start" stroke="none">H<tspan font-size="10" dy="4">B</tspan> = 232,43 T</text>
  </g>

  <text x="410" y="452" text-anchor="middle" fill="#5f6368" font-size="12">
    reticulado 12&#215;4 m (3 paneles), diagonales a la derecha · A: apoyo fijo a la pared · B: movil vertical · cargas (rojo), reacciones (azul)
  </text>
</svg>
