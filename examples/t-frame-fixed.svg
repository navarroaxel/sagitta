<svg xmlns="http://www.w3.org/2000/svg" viewBox="120 30 585 530" font-family="system-ui, sans-serif">
  <!--
    Structure: T-frame — a vertical column fixed (built-in) to the ground at its
      base, with a horizontal beam on top forming a T. Solid web, rigid joints.
    World in metres, y up. Transform: sx = 320 + x*40 ; sy = 450 - y*40
    Nodes:
      A  (0,0)   fixed / built-in base                 -> (320,450)
      B  (0,8)   T-junction, top of the column (rigid) -> (320,130)
      C  (-4,8)  left arm, free end                    -> (160,130)
      D  (7,8)   right arm, free end                   -> (600,130)
    Members:
      A-B  column (8 m)
      C-D  beam (11 m: left arm C-B = 4 m + right arm B-D = 7 m)
    Determinacy: fixed base (H,V,M = 3 reactions), no hinges, tree structure
      -> 3 reactions - 3 equilibrium eqs = 0  =>  statically determinate.
    Loads (all in T):
      P_C = 10 T vertical (downward) at C (-4,8)
      P_D = 10 T vertical (downward) at D (7,8)
      H_D = 10 T horizontal to the right at D (7,8)
    Support reactions (computed):
      A: H_A = 10 T (to the left) ; V_A = 20 T (up) ; M_A = 110 T.m (counterclockwise)
    Equilibrium:
      SumFx = -10 + 10 = 0
      SumFy = 20 - 10 - 10 = 0
      SumM_A = +110 + (-4)(-10) + (7)(-10) + (8)(-10) = 110 + 40 - 70 - 80 = 0
    The given reactions satisfy global equilibrium.
  -->

  <rect x="120" y="30" width="585" height="530" fill="#ffffff"/>

  <!-- ===== Dimensions ===== -->
  <g stroke="#9aa0a6" stroke-width="1" fill="#5f6368" font-size="12">
    <!-- beam (top): 4.00 | 7.00 -->
    <line x1="160" y1="56" x2="600" y2="56"/>
    <line x1="160" y1="51" x2="160" y2="61"/>
    <line x1="320" y1="51" x2="320" y2="61"/>
    <line x1="600" y1="51" x2="600" y2="61"/>
    <text x="240" y="48" text-anchor="middle">4.00</text>
    <text x="460" y="48" text-anchor="middle">7.00</text>

    <!-- column (left of it): 8.00 m -->
    <line x1="288" y1="130" x2="288" y2="450"/>
    <line x1="283" y1="130" x2="293" y2="130"/>
    <line x1="283" y1="450" x2="293" y2="450"/>
    <text x="276" y="290" text-anchor="middle" transform="rotate(-90 276 290)">8.00 m</text>
  </g>

  <!-- ===== Solid-web frame (rigid joints) ===== -->
  <g stroke="#1a1a1a" stroke-width="5" stroke-linecap="round">
    <line x1="320" y1="450" x2="320" y2="130"/> <!-- column A-B -->
    <line x1="160" y1="130" x2="600" y2="130"/> <!-- beam C-B-D -->
  </g>

  <!-- ===== Fixed / built-in base at A (ground line + hatch) ===== -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none">
    <line x1="296" y1="450" x2="344" y2="450"/>
    <line x1="304" y1="450" x2="296" y2="458"/>
    <line x1="314" y1="450" x2="306" y2="458"/>
    <line x1="324" y1="450" x2="316" y2="458"/>
    <line x1="334" y1="450" x2="326" y2="458"/>
    <line x1="344" y1="450" x2="336" y2="458"/>
  </g>

  <!-- ===== Nodes ===== -->
  <g fill="#1a1a1a">
    <circle cx="320" cy="450" r="4"/> <!-- A base -->
    <circle cx="320" cy="130" r="4"/> <!-- B junction -->
    <circle cx="160" cy="130" r="4"/> <!-- C left end -->
    <circle cx="600" cy="130" r="4"/> <!-- D right end -->
  </g>

  <!-- ===== Node labels ===== -->
  <g font-size="13" font-weight="600" fill="#6a1b9a">
    <text x="340" y="470" text-anchor="start">A</text>
    <text x="332" y="124" text-anchor="start">B</text>
    <text x="146" y="126" text-anchor="end">C</text>
    <text x="600" y="154" text-anchor="middle">D</text>
  </g>

  <!-- ===== Loads (red) ===== -->
  <g stroke="#c0392b" fill="#c0392b" font-size="13" font-weight="700">
    <!-- P_C = 10 T downward at C (tip at the node, shaft trailing up) -->
    <line x1="160" y1="84" x2="160" y2="118" stroke-width="2.5"/>
    <polygon points="160,130 154,118 166,118" stroke="none"/>
    <text x="160" y="76" text-anchor="middle" stroke="none">10 T</text>

    <!-- P_D = 10 T downward at D -->
    <line x1="600" y1="84" x2="600" y2="118" stroke-width="2.5"/>
    <polygon points="600,130 594,118 606,118" stroke="none"/>
    <text x="588" y="76" text-anchor="end" stroke="none">10 T</text>

    <!-- H_D = 10 T horizontal to the right at D; drawn outside the node (to the
         right) pointing in the force direction, so it is not collinear with the beam -->
    <line x1="600" y1="130" x2="636" y2="130" stroke-width="2.5"/>
    <polygon points="648,130 636,124 636,136" stroke="none"/>
    <text x="654" y="134" text-anchor="start" stroke="none">10 T</text>
  </g>

  <!-- ===== Support reactions (blue) ===== -->
  <g stroke="#1a73e8" fill="#1a73e8" font-size="13" font-weight="700">
    <!-- A: H_A = 10 T to the left (drawn to the right of the support, pointing toward it) -->
    <line x1="364" y1="450" x2="400" y2="450" stroke-width="2.5"/>
    <polygon points="352,450 364,444 364,456" stroke="none"/>
    <text x="404" y="454" text-anchor="start" stroke="none">H<tspan font-size="10" dy="4">A</tspan><tspan dy="-4"> = 10 T</tspan></text>

    <!-- A: V_A = 20 T upward (drawn below the base pointing up) -->
    <line x1="320" y1="476" x2="320" y2="514" stroke-width="2.5"/>
    <polygon points="320,466 314,478 326,478" stroke="none"/>
    <text x="336" y="500" text-anchor="start" stroke="none">V<tspan font-size="10" dy="4">A</tspan><tspan dy="-4"> = 20 T</tspan></text>

    <!-- A: M_A = 110 T.m counterclockwise (arc centered on node A) -->
    <circle cx="320" cy="450" r="2" stroke="none"/>
    <path d="M 311 434.41 A 18 18 0 1 0 329 434.41" fill="none" stroke-width="2.5"/>
    <polygon points="322.76,430.8 331.4,430.2 326.6,438.6" stroke="none"/>
    <text x="280" y="454" text-anchor="end" stroke="none">M<tspan font-size="10" dy="4">A</tspan><tspan dy="-4"> = 110 T&#183;m</tspan></text>
  </g>

  <text x="410" y="546" text-anchor="middle" fill="#5f6368" font-size="13">
    T-frame — column fixed at base A. Loads red, reactions blue; equilibrium satisfied.
  </text>
</svg>
